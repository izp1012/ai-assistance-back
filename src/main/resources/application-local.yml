server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    # Docker 로컬 PostgreSQL 사용 시 아래 주석 해제 (docker-compose up -d 실행 필요)
#    url: jdbc:postgresql://localhost:5432/youf
#    driver-class-name: org.postgresql.Driver
#    username: admin
#    password: admin1234
    # H2 인메모리 DB (기본값)
    url: jdbc:h2:mem:test;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    properties:
      '[hibernate.default_batch_fetch_size]': 100
      '[hibernate.format_sql]': true
    show-sql: true
  output:
    ansi:
      enabled: always
  ai:
    openai:
      api-key: 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
      api-url : https://api.openai.com/v1/chat/completions
    chat:
      options:
        model: gpt-4o
logging:
  level:
    com.uf.assistance: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
